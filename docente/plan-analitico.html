<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechAcademia — Plan analítico</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    .selector-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .selector-bar select { width:auto; margin:0; }
    .tab-periodos { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:14px; }
    .tab-periodo {
      font-size:11px; padding:5px 12px; border-radius:99px;
      border:1px solid var(--border-m); cursor:pointer;
      color:var(--text-2); background:transparent; transition:all .15s;
    }
    .tab-periodo:hover { background:var(--bg); }
    .tab-periodo.active { background:var(--az); color:white; border-color:var(--az); }

    .plan-table { width:100%; border-collapse:collapse; font-size:12px; }
    .plan-table th {
      text-align:left; font-size:10px; font-weight:600; color:var(--text-3);
      padding:6px 8px; border-bottom:1px solid var(--border);
      text-transform:uppercase; letter-spacing:.05em; background:var(--bg);
    }
    .plan-table td {
      padding:6px 4px; border-bottom:1px solid var(--border);
      vertical-align:top; background:white;
    }
    .plan-table tr:last-child td { border-bottom:none; }
    .plan-table tr.examen-row td {
      background:var(--bg); color:var(--text-3); font-style:italic;
      font-size:11px; text-align:center; padding:6px;
    }

    .col-semana    { width:80px;  min-width:80px; }
    .col-eje        { width:150px; min-width:140px; }
    .col-contenido { width:160px; min-width:150px; }
    .col-proceso    { width:210px; min-width:180px; }
    .col-saber      { width:200px; min-width:180px; }
    .col-acciones  { width:36px;  min-width:36px; text-align:center; }

    .cell-select {
      width:100%; font-size:11px; padding:5px 6px;
      border:1px solid var(--border-m); border-radius:4px;
      background:white; color:var(--text); font-family:inherit;
      box-sizing:border-box; cursor:pointer; margin-bottom:4px;
    }
    .cell-select:focus { outline:none; border-color:var(--az); }
    .cell-select:disabled { background:var(--bg); color:var(--text-3); cursor:not-allowed; }

    .cell-input {
      width:100%; font-size:11px; padding:6px 8px;
      border:1px solid transparent; border-radius:4px;
      background:transparent; color:var(--text); font-family:inherit;
      resize:none; overflow:hidden; transition:border-color .15s, background .15s;
      line-height:1.6; box-sizing:border-box; display:block; min-height:50px;
    }
    .cell-input:focus { outline:none; border-color:var(--az); background:white; }
    .cell-input:hover { border-color:var(--border-m); }

    .pda-wrap { position:relative; }
    .pda-text {
      font-size:11px; line-height:1.5; color:var(--text-2);
      padding:6px 28px 6px 8px; border:1px solid transparent;
      border-radius:4px; background:transparent; min-height:50px;
      white-space:pre-wrap; word-wrap:break-word;
    }
    .pda-textarea {
      display:none; width:100%; font-size:11px; padding:6px 28px 6px 8px;
      border:1px solid var(--az); border-radius:4px; background:white;
      color:var(--text); font-family:inherit; resize:none; overflow:hidden;
      line-height:1.5; box-sizing:border-box; min-height:50px;
    }
    .btn-lock {
      position:absolute; top:5px; right:4px; background:none; border:none;
      cursor:pointer; font-size:13px; color:var(--text-3); padding:2px;
      border-radius:3px; line-height:1; transition:color .15s;
    }
    .btn-lock:hover { color:var(--az); }

    .saber-texto {
      font-size:11px; color:var(--text-2); line-height:1.5;
      padding:4px 6px; min-height:30px; white-space:pre-wrap;
      word-wrap:break-word;
    }

    .btn-fila {
      background:none; border:none; cursor:pointer; color:var(--text-3);
      padding:4px; border-radius:4px; font-size:14px; transition:color .15s;
    }
    .btn-fila:hover { color:var(--co); }
    .btn-add-fila {
      font-size:11px; color:var(--az); background:none; border:none;
      cursor:pointer; padding:8px 0; display:flex; align-items:center; gap:4px;
    }
    .btn-add-fila:hover { text-decoration:underline; }

    .save-bar {
      position:sticky; bottom:0; background:var(--bg-card);
      border-top:1px solid var(--border); padding:10px 20px;
      display:flex; align-items:center; justify-content:space-between;
      margin:0 -20px -20px; z-index:10;
    }
    .save-status { font-size:11px; color:var(--text-3); }
    .toast {
      position:fixed; bottom:70px; right:20px; background:var(--vd);
      color:white; padding:10px 16px; border-radius:var(--radius-s);
      font-size:12px; z-index:200; display:none;
    }
    .info-plan {
      font-size:11px; color:var(--az-d); background:var(--az-l);
      border:1px solid #B5D4F4; border-radius:var(--radius-s);
      padding:8px 12px; margin-bottom:12px;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-area">
    <div class="topbar">
      <div>
        <div class="topbar-title">Plan analítico</div>
        <div class="topbar-sub" id="topbar-sub">Selecciona un grupo</div>
      </div>
      <div class="selector-bar">
        <select id="sel-grupo" onchange="onGrupoChange()">
          <option value="">Selecciona grupo...</option>
        </select>
        <select id="sel-materia" onchange="onMateriaChange()" style="display:none;">
          <option value="">Materia...</option>
        </select>
      </div>
    </div>

    <div class="page-content">
      <div id="loading" class="loading">Cargando...</div>
      <div id="content" style="display:none;">
        <div class="info-plan" id="info-plan" style="display:none;">
          💡 Elige Eje → Contenido para auto-rellenar PDA y nivel Bloom. El 🔒 desbloquea edición del PDA.
        </div>
        <div class="tab-periodos" id="tab-periodos"></div>
        <div class="card mb-0" id="card-tabla" style="display:none;">
          <div style="overflow-x:auto;">
            <table class="plan-table" id="plan-table">
              <thead>
                <tr>
                  <th class="col-semana">Periodo /<br>Semana</th>
                  <th class="col-eje">Eje articulador</th>
                  <th class="col-contenido">Contenido</th>
                  <th class="col-proceso">PDA</th>
                  <th class="col-saber">Saber y saber hacer</th>
                  <th style="width:130px;">Tipo actividad</th>
                  <th class="col-acciones"></th>
                </tr>
              </thead>
              <tbody id="plan-tbody"></tbody>
            </table>
          </div>
          <div style="padding:4px 0;">
            <button class="btn-add-fila" id="btn-add-fila">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              Agregar fila
            </button>
            <button class="btn-add-fila" id="btn-add-examen" style="margin-left:12px;color:var(--text-3);">
              + Agregar fila de examen
            </button>
          </div>
        </div>
      </div>
      <div class="save-bar" id="save-bar" style="display:none;">
        <span class="save-status" id="save-status">Sin cambios pendientes</span>
        <button class="btn btn-primary" id="btn-guardar">Guardar plan</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { requireAuth }   from '../js/auth.js'
  import { renderSidebar } from '../js/sidebar-docente.js'
  import { supabase }      from '../js/supabase.js'

  const CATALOGO = {
    "Fundamentos digitales": [
      {"concepto": "Encendido y apagado del equipo", "nivel": "Primaria 1°-3°", "pda": "★ NO NEGOCIABLE\n\nEl alumno desarrolla autonomía en el uso básico del equipo.", "saber": {"conocimiento": "Identifica botón.", "comprension": "Entiende riesgos.", "aplicacion": "Opera solo.", "analisis": "Detecta fallos.", "sintesis": "Explica a otros.", "evaluacion": "Propone reglas."}},
      {"concepto": "Cierre de sesión", "nivel": "Primaria 1°-3°", "pda": "Uso básico y seguridad de cuentas.", "saber": {"conocimiento": "Encuentra botón.", "comprension": "Importancia de privacidad.", "aplicacion": "Cierra sesión.", "analisis": "Identifica riesgos.", "sintesis": "Crea cartel.", "evaluacion": "Argumenta seguridad."}},
      {"concepto": "Teclado: atajos básicos (Ctrl+C, V, Z, S)", "nivel": "Primaria 4°-6°", "pda": "Eficiencia mediante atajos.", "saber": {"conocimiento": "Conoce combinaciones.", "comprension": "Ahorro de tiempo.", "aplicacion": "Usa en edición.", "analisis": "Compara velocidad.", "sintesis": "Memoriza 5 nuevos.", "evaluacion": "Crea guía personal."}}
    ],
    "Ciberseguridad": [
      {"concepto": "Contraseñas: verificación en dos pasos (2FA)", "nivel": "Secundaria 7°-8°", "pda": "Prácticas avanzadas de seguridad digital.", "saber": {"conocimiento": "Conoce 2FA.", "comprension": "Entiende métodos.", "aplicacion": "Activa en Google.", "analisis": "Compara SMS vs App.", "sintesis": "Genera códigos.", "evaluacion": "Argumenta importancia."}},
      {"concepto": "HTTPS y seguridad web", "nivel": "Secundaria 9°", "pda": "★ NO NEGOCIABLE\n\nComprensión de protocolos de seguridad web.", "saber": {"conocimiento": "Sabe qué es HTTPS.", "comprension": "Cifrado SSL.", "aplicacion": "Verifica candado.", "analisis": "Identifica sitios inseguros.", "sintesis": "Navega con criterio.", "evaluacion": "Propone políticas."}}
    ],
    "Sistemas y Terminal": [
      {"concepto": "Interfaz de Línea de Comandos (CLI)", "nivel": "Preparatoria", "pda": "Gestión del SO mediante comandos.", "saber": {"conocimiento": "Identifica CMD/PS.", "comprension": "Lógica sin GUI.", "aplicacion": "Usa cd, ls.", "analisis": "Compara vs GUI.", "sintesis": "Crea script .bat.", "evaluacion": "Juzga eficiencia."}}
    ]
  };

  let user = null;
  let grupos = [];
  let grupoMateriaId = null;
  let periodoId = null;
  let filas = [];
  let haycambios = false;

  async function init() {
    user = await requireAuth();
    renderSidebar('plan-analitico');
    await cargarGrupos();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }
  init();

async function cargarGrupos() {
    // Volvemos a la consulta original que sí te funcionaba en el TXT
    const { data, error } = await supabase
      .from('docente_grupos_materias')
      .select('id, grupo_id, materia_id, grupos(nombre), materias(nombre)')
      .eq('docente_id', user.id);

    if (error) {
      console.error("Error en Supabase:", error);
      return;
    }

    grupos = data;
    const sel = document.getElementById('sel-grupo');
    
    // Limpiamos y aseguramos que el desplegable se llene
    sel.innerHTML = '<option value="">Selecciona grupo...</option>';
    
    // Obtenemos los nombres de los grupos de forma única
    const unique = [...new Set(data.map(g => g.grupos?.nombre).filter(n => n))];
    
    // Ordenamos para que 9° aparezca en su lugar lógico
    unique.sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));

    unique.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; 
      opt.textContent = n;
      sel.appendChild(opt);
    });
    
    console.log("Grupos cargados:", unique);
  }
    
    grupos = data;
    const selGrupo = document.getElementById('sel-grupo');
    selGrupo.innerHTML = '<option value="">Selecciona grupo...</option>';

    // Extraer nombres únicos de los grupos que realmente vienen de la DB
    const nombresUnicos = [...new Set(data
      .filter(item => item.grupos && item.grupos.nombre)
      .map(item => item.grupos.nombre)
    )].sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));

    nombresUnicos.forEach(nombre => {
      const opt = document.createElement('option');
      opt.value = nombre;
      opt.textContent = nombre;
      selGrupo.appendChild(opt);
    });
  }

  window.onGrupoChange = () => {
    const gn = document.getElementById('sel-grupo').value;
    const sm = document.getElementById('sel-materia');
    sm.innerHTML = '<option value="">Materia...</option>';
    if (!gn) { sm.style.display='none'; return; }
    
    const filtradas = grupos.filter(g => g.grupos.nombre === gn);
    filtradas.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.materias.nombre;
      sm.appendChild(opt);
    });
    sm.style.display = 'inline-block';
  };

  window.onMateriaChange = async () => {
    grupoMateriaId = document.getElementById('sel-materia').value;
    if (!grupoMateriaId) return;
    const g = grupos.find(x => x.id == grupoMateriaId);
    document.getElementById('topbar-sub').textContent = `${g.grupos.nombre} — ${g.materias.nombre}`;
    await cargarPeriodos();
  };

  async function cargarPeriodos() {
    const { data } = await supabase.from('periodos').select('*').order('numero');
    const container = document.getElementById('tab-periodos');
    container.innerHTML = '';
    data?.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'tab-periodo';
      btn.textContent = p.nombre;
      btn.onclick = () => seleccionarPeriodo(p.id, btn);
      container.appendChild(btn);
    });
    if (data?.length) container.firstChild.click();
  }

  async function seleccionarPeriodo(id, btn) {
    if (haycambios && !confirm('¿Cambiar sin guardar?')) return;
    periodoId = id;
    document.querySelectorAll('.tab-periodo').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('card-tabla').style.display = 'block';
    document.getElementById('save-bar').style.display = 'flex';
    document.getElementById('info-plan').style.display = 'block';
    await cargarFilas();
  }

  async function cargarFilas() {
    const { data } = await supabase.from('plan_analitico')
      .select('*').eq('grupo_materia_id', grupoMateriaId).eq('periodo_id', periodoId).order('orden');
    filas = data || [];
    renderTabla();
    haycambios = false;
    actualizarEstadoGuardado();
  }

  function renderTabla() {
    const tbody = document.getElementById('plan-tbody');
    tbody.innerHTML = '';
    filas.forEach((f, i) => {
      const tr = document.createElement('tr');
      if (f.es_examen) {
        tr.className = 'examen-row';
        tr.innerHTML = `<td colspan="6">Semana ${f.semana || ''}: Examen</td><td><button class="btn-fila" onclick="eliminarFila(${i})">✕</button></td>`;
      } else {
        tr.innerHTML = `
          <td><input class="cell-input" style="min-height:30px;" value="${f.semana||''}" oninput="updateFila(${i},'semana',this.value)"></td>
          <td><select class="cell-select" onchange="onEjeChange(${i},this.value)">
            <option value="">Eje...</option>
            ${Object.keys(CATALOGO).map(k=>`<option value="${k}" ${f.eje_articulador===k?'selected':''}>${k}</option>`).join('')}
          </select></td>
          <td><select class="cell-select" onchange="onContenidoChange(${i},this.value)" ${!f.eje_articulador?'disabled':''}>
            <option value="">Contenido...</option>
            ${f.eje_articulador?CATALOGO[f.eje_articulador].map(c=>`<option value="${c.concepto}" ${f.contenido===c.concepto?'selected':''}>${c.concepto}</option>`).join(''):''}
          </select></td>
          <td><div class="pda-wrap">
            <div class="pda-text" id="pda-t-${i}">${f.aprendizaje_esperado||''}</div>
            <textarea class="pda-textarea" id="pda-a-${i}" oninput="updateFila(${i},'aprendizaje_esperado',this.value)">${f.aprendizaje_esperado||''}</textarea>
            <button class="btn-lock" onclick="toggleLock(${i})">🔒</button>
          </div></td>
          <td><select class="cell-select" onchange="updateBloom(${i},this.value)" ${!f.contenido?'disabled':''}>
            <option value="">Bloom...</option>
            ${['conocimiento','comprension','aplicacion','analisis','sintesis','evaluacion'].map(k=>`<option value="${k}" ${f.bloom_nivel===k?'selected':''}>${k}</option>`).join('')}
          </select><div class="saber-texto">${f.saber_hacer||''}</div></td>
          <td><input class="cell-input" value="${f.tipo_actividad||''}" oninput="updateFila(${i},'tipo_actividad',this.value)"></td>
          <td><button class="btn-fila" onclick="eliminarFila(${i})">✕</button></td>`;
      }
      tbody.appendChild(tr);
    });
  }

  window.updateFila = (i, fld, val) => { filas[i][fld]=val; haycambios=true; actualizarEstadoGuardado(); };
  window.onEjeChange = (i, eje) => { filas[i].eje_articulador=eje; filas[i].contenido=''; renderTabla(); };
  window.onContenidoChange = (i, con) => { 
    const item = CATALOGO[filas[i].eje_articulador].find(x=>x.concepto===con);
    filas[i].contenido=con; filas[i].aprendizaje_esperado=item?item.pda:''; renderTabla(); 
  };
  window.updateBloom = (i, n) => {
    const item = CATALOGO[filas[i].eje_articulador].find(x=>x.concepto===filas[i].contenido);
    filas[i].bloom_nivel=n; filas[i].saber_hacer=item?.saber[n]||''; renderTabla();
  };
  window.toggleLock = (i) => {
    const t=document.getElementById(`pda-t-${i}`), a=document.getElementById(`pda-a-${i}`);
    const isVisible = a.style.display==='block';
    a.style.display=isVisible?'none':'block'; t.style.display=isVisible?'block':'none';
  };
  window.eliminarFila = (i) => { filas.splice(i,1); haycambios=true; renderTabla(); };
  document.getElementById('btn-add-fila').onclick = () => { filas.push({es_examen:false}); renderTabla(); };
  document.getElementById('btn-add-examen').onclick = () => { filas.push({es_examen:true}); renderTabla(); };

  function actualizarEstadoGuardado() {
    const s = document.getElementById('save-status');
    s.textContent = haycambios ? 'Cambios sin guardar' : 'Guardado ✓';
    s.style.color = haycambios ? 'var(--co)' : 'var(--vd)';
  }

  document.getElementById('btn-guardar').onclick = async () => {
    const btn = document.getElementById('btn-guardar');
    btn.disabled=true; btn.textContent='Guardando...';
    try {
      await supabase.from('plan_analitico').delete().eq('grupo_materia_id', grupoMateriaId).eq('periodo_id', periodoId);
      if (filas.length) {
        await supabase.from('plan_analitico').insert(filas.map((f, i) => ({
          ...f, grupo_materia_id: grupoMateriaId, periodo_id: periodoId, orden: i
        })));
      }
      haycambios=false; actualizarEstadoGuardado(); mostrarToast('Guardado');
    } catch(e) { mostrarToast('Error','error'); }
    btn.disabled=false; btn.textContent='Guardar plan';
  };

  function mostrarToast(m,t='ok'){ const el=document.getElementById('toast'); el.textContent=m; el.style.display='block'; setTimeout(()=>el.style.display='none',2000); }
</script>
</body>
</html>
